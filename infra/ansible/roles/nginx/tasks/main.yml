---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true
  become: true

- name: Configure nginx cache path
  ansible.builtin.file:
    path: "{{ nginx_cache_path }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  become: true

- name: Ensure placeholder is present (first deploy safety)
  become: true
  ansible.builtin.copy:
    dest: /etc/nginx/sites-available/_placeholder.conf
    mode: '0644'
    content: |
      server {
          listen 80 default_server;
          server_name _;
          return 200 'OK';
          add_header Content-Type text/plain;
      }
  notify: Reload nginx

- name: Enable placeholder site symlink (idempotent)
  become: true
  ansible.builtin.file:
    src: /etc/nginx/sites-available/_placeholder.conf
    dest: /etc/nginx/sites-enabled/_placeholder.conf
    state: link

- name: Remove accidental patch garbage from existing webapp.conf (if any)
  become: true
  ansible.builtin.replace:
    path: /etc/nginx/sites-available/webapp.conf
    regexp: '\*\*\* End Patch.*'
    replace: ''
  ignore_errors: yes  # файла может не быть

- name: Deploy nginx site config (validated)
  become: true
  ansible.builtin.template:
    src: webapp.conf.j2
    dest: /etc/nginx/sites-available/webapp.conf
    mode: '0644'
    owner: root
    group: root
    validate: 'nginx -t -c %s'
  notify: Reload nginx

- name: Enable site
  become: true
  ansible.builtin.file:
    src: /etc/nginx/sites-available/webapp.conf
    dest: /etc/nginx/sites-enabled/webapp.conf
    state: link

- name: Disable placeholder site
  become: true
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/_placeholder.conf
    state: absent
  notify: Reload nginx

- name: Remove default site
  become: true
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
