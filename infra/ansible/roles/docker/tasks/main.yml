---
- name: Ensure keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Configure Docker apt repository
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: |
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable
    mode: "0644"

- name: Update apt cache (docker)
  apt:
    update_cache: true

- name: Install Docker Engine and Compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Ensure docker service is running
  service:
    name: docker
    state: started
    enabled: true

- name: Add app user to docker group
  user:
    name: "{{ app_user }}"
    groups: docker
    append: true
  register: add_app_user_to_docker_group

- name: Reset SSH connection to apply docker group membership
  meta: reset_connection
  when: add_app_user_to_docker_group.changed
