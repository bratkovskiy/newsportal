---
- name: Ensure SSH directory for deploy user exists
  ansible.builtin.file:
    path: "/home/{{ webapp_deploy_user }}/.ssh"
    state: directory
    owner: "{{ webapp_deploy_user }}"
    group: "{{ webapp_deploy_user }}"
    mode: "0700"

- name: Copy deploy SSH key to remote host
  ansible.builtin.copy:
    src: "{{ webapp_git_deploy_key_local }}"
    dest: "{{ webapp_git_deploy_key_remote }}"
    owner: "{{ webapp_deploy_user }}"
    group: "{{ webapp_deploy_user }}"
    mode: "0600"

- name: Ensure github.com is a known host for deploy user
  ansible.builtin.known_hosts:
    path: "/home/{{ webapp_deploy_user }}/.ssh/known_hosts"
    name: "github.com"
    key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 github.com 2>/dev/null') }}"

- name: Check if repository directory already contains git repo
  ansible.builtin.stat:
    path: "{{ webapp_repo_dest }}/.git"
  register: webapp_repo_git
  become: true

- name: Remove existing non-git directory at repo dest
  ansible.builtin.file:
    path: "{{ webapp_repo_dest }}"
    state: absent
  when: not webapp_repo_git.stat.exists
  become: true

- name: Configure Git safe directory
  become: true
  become_user: "{{ webapp_deploy_user }}"
  command: "git config --global --add safe.directory {{ webapp_repo_dest }}"
  args:
    creates: "/home/{{ webapp_deploy_user }}/.gitconfig"
  register: git_safe_dir
  changed_when: false
  check_mode: no

- name: Remove existing Git repository directory if permission issues
  ansible.builtin.file:
    path: "{{ webapp_repo_dest }}"
    state: absent
  become: true
  when: webapp_repo_git.stat.exists

- name: Create repository directory with proper permissions
  ansible.builtin.file:
    path: "{{ webapp_repo_dest }}"
    state: directory
    owner: "{{ webapp_deploy_user }}"
    group: "{{ webapp_group }}"
    mode: "0775"
  become: true

- name: Clone application repository
  ansible.builtin.git:
    repo: "{{ webapp_repo_url }}"
    dest: "{{ webapp_repo_dest }}"
    version: "{{ webapp_repo_branch }}"
    update: true
    force: yes
  become: true
  become_user: "{{ webapp_deploy_user }}"
  environment:
    GIT_SSH_COMMAND: "ssh -i {{ webapp_git_deploy_key_remote }} -o StrictHostKeyChecking=no"

- name: Ensure repository permissions
  ansible.builtin.file:
    path: "{{ webapp_repo_dest }}"
    owner: "{{ service_user_web }}"
    group: "{{ webapp_group }}"
    recurse: true
    mode: "0775"
  become: true
