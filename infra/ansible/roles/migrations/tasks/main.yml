---
- name: Check if DB seed marker exists
  stat:
    path: "{{ project_root }}/.db_seeded"
  become_user: "{{ app_user }}"
  register: db_seed_marker
  changed_when: false

- name: Check if database has any public tables
  command: >-
    {{ compose_cmd }} exec -T postgres psql -U payload -d payload
    -tAc "SELECT EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE');"
  args:
    chdir: "{{ project_root }}"
  become_user: "{{ app_user }}"
  register: payload_db_has_any_tables
  changed_when: false

- name: Ensure seed directory exists
  file:
    path: "{{ project_root }}/.db_seed"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0700"
  when:
    - local_db_seed_file is defined
    - (local_db_seed_file | length) > 0
    - not (db_seed_marker.stat.exists | default(false))
    - (payload_db_has_any_tables.stdout | trim) != 't'

- name: Copy DB seed dump to server
  copy:
    src: "{{ local_db_seed_file }}"
    dest: "{{ project_root }}/.db_seed/seed.sql"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0600"
  when:
    - local_db_seed_file is defined
    - (local_db_seed_file | length) > 0
    - not (db_seed_marker.stat.exists | default(false))
    - (payload_db_has_any_tables.stdout | trim) != 't'

- name: Restore DB seed into Postgres (first deploy only)
  shell: >-
    {{ compose_cmd }} exec -T postgres psql -U payload -d payload -v ON_ERROR_STOP=1 < {{ project_root }}/.db_seed/seed.sql
  args:
    chdir: "{{ project_root }}"
  become_user: "{{ app_user }}"
  register: db_seed_restore_result
  when:
    - local_db_seed_file is defined
    - (local_db_seed_file | length) > 0
    - not (db_seed_marker.stat.exists | default(false))
    - (payload_db_has_any_tables.stdout | trim) != 't'

- name: Create DB seed marker file
  file:
    path: "{{ project_root }}/.db_seeded"
    state: touch
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0600"
  when:
    - db_seed_restore_result is defined
    - (db_seed_restore_result.rc | default(1)) == 0

- name: Remove DB seed dump from server
  file:
    path: "{{ project_root }}/.db_seed/seed.sql"
    state: absent
  when:
    - db_seed_restore_result is defined
    - (db_seed_restore_result.rc | default(1)) == 0

- name: Ensure payload_migrations table exists
  command: >-
    {{ compose_cmd }} exec -T postgres psql -U payload -d payload
    -v ON_ERROR_STOP=1
    -c "CREATE TABLE IF NOT EXISTS public.payload_migrations (id serial PRIMARY KEY, name text NOT NULL, batch integer NOT NULL, created_at timestamptz NOT NULL DEFAULT now(), updated_at timestamptz NOT NULL DEFAULT now());
    ALTER TABLE public.payload_migrations ADD COLUMN IF NOT EXISTS name text;
    ALTER TABLE public.payload_migrations ADD COLUMN IF NOT EXISTS batch integer;
    ALTER TABLE public.payload_migrations ADD COLUMN IF NOT EXISTS created_at timestamptz NOT NULL DEFAULT now();
    ALTER TABLE public.payload_migrations ADD COLUMN IF NOT EXISTS updated_at timestamptz NOT NULL DEFAULT now();
    ALTER TABLE public.payload_migrations ALTER COLUMN name SET NOT NULL;
    ALTER TABLE public.payload_migrations ALTER COLUMN batch SET NOT NULL;"
  args:
    chdir: "{{ project_root }}"
  become_user: "{{ app_user }}"

- name: Check if articles table exists
  command: >-
    {{ compose_cmd }} exec -T postgres psql -U payload -d payload
    -tAc "SELECT to_regclass('public.articles') IS NOT NULL;"
  args:
    chdir: "{{ project_root }}"
  become_user: "{{ app_user }}"
  register: articles_table_exists
  changed_when: false

- name: Check if tags table exists
  command: >-
    {{ compose_cmd }} exec -T postgres psql -U payload -d payload
    -tAc "SELECT to_regclass('public.tags') IS NOT NULL;"
  args:
    chdir: "{{ project_root }}"
  become_user: "{{ app_user }}"
  register: tags_table_exists
  changed_when: false

- name: Check if categories table exists
  command: >-
    {{ compose_cmd }} exec -T postgres psql -U payload -d payload
    -tAc "SELECT to_regclass('public.categories') IS NOT NULL;"
  args:
    chdir: "{{ project_root }}"
  become_user: "{{ app_user }}"
  register: categories_table_exists
  changed_when: false

- name: Bootstrap Payload schema on empty DB
  command: >-
    {{ compose_cmd }} run --rm -e PAYLOAD_DB_PUSH=true -e NODE_ENV=development cms
    node_modules/.bin/tsx src/init-db.ts
  args:
    chdir: "{{ project_root }}"
  become_user: "{{ app_user }}"
  register: payload_bootstrap_result
  when: (articles_table_exists.stdout | trim != 't') or (tags_table_exists.stdout | trim != 't') or (categories_table_exists.stdout | trim != 't')

- name: Re-check if articles table exists after bootstrap
  command: >-
    {{ compose_cmd }} exec -T postgres psql -U payload -d payload
    -tAc "SELECT to_regclass('public.articles') IS NOT NULL;"
  args:
    chdir: "{{ project_root }}"
  become_user: "{{ app_user }}"
  register: articles_table_exists_after_bootstrap
  changed_when: false

- name: Re-check if tags table exists after bootstrap
  command: >-
    {{ compose_cmd }} exec -T postgres psql -U payload -d payload
    -tAc "SELECT to_regclass('public.tags') IS NOT NULL;"
  args:
    chdir: "{{ project_root }}"
  become_user: "{{ app_user }}"
  register: tags_table_exists_after_bootstrap
  changed_when: false

- name: Re-check if categories table exists after bootstrap
  command: >-
    {{ compose_cmd }} exec -T postgres psql -U payload -d payload
    -tAc "SELECT to_regclass('public.categories') IS NOT NULL;"
  args:
    chdir: "{{ project_root }}"
  become_user: "{{ app_user }}"
  register: categories_table_exists_after_bootstrap
  changed_when: false

- name: Fail if Payload schema bootstrap did not create core tables
  command: >-
    {{ compose_cmd }} exec -T postgres psql -U payload -d payload
    -c "\\dt+"
  args:
    chdir: "{{ project_root }}"
  become_user: "{{ app_user }}"
  when: (articles_table_exists_after_bootstrap.stdout | trim != 't') or (tags_table_exists_after_bootstrap.stdout | trim != 't') or (categories_table_exists_after_bootstrap.stdout | trim != 't')

- name: Stop deployment if Payload core tables are missing
  fail:
    msg: "Payload schema bootstrap did not create required tables (articles/tags/categories). See previous \\dt+ output."
  when: (articles_table_exists_after_bootstrap.stdout | trim != 't') or (tags_table_exists_after_bootstrap.stdout | trim != 't') or (categories_table_exists_after_bootstrap.stdout | trim != 't')

- name: Check how many payload migrations are already recorded
  command: >-
    {{ compose_cmd }} exec -T postgres psql -U payload -d payload
    -tAc "SELECT COUNT(*) FROM public.payload_migrations;"
  args:
    chdir: "{{ project_root }}"
  become_user: "{{ app_user }}"
  register: payload_migrations_count
  changed_when: false

- name: Check if database has any content rows (articles/categories/tags)
  command: >-
    {{ compose_cmd }} exec -T postgres psql -U payload -d payload
    -tAc "SELECT (
      (CASE WHEN to_regclass('public.articles') IS NULL THEN false ELSE EXISTS (SELECT 1 FROM public.articles LIMIT 1) END)
      OR (CASE WHEN to_regclass('public.categories') IS NULL THEN false ELSE EXISTS (SELECT 1 FROM public.categories LIMIT 1) END)
      OR (CASE WHEN to_regclass('public.tags') IS NULL THEN false ELSE EXISTS (SELECT 1 FROM public.tags LIMIT 1) END)
    );"
  args:
    chdir: "{{ project_root }}"
  become_user: "{{ app_user }}"
  register: payload_db_has_content_rows
  changed_when: false

- name: Detect if database was seeded (marker or current run)
  set_fact:
    payload_db_seeded: >-
      {{
        (db_seed_marker.stat.exists | default(false))
        or ((db_seed_restore_result is defined) and ((db_seed_restore_result.rc | default(1)) == 0))
      }}
  changed_when: false

- name: Decide if it is safe to auto-confirm Payload migration warning
  set_fact:
    payload_safe_to_autoconfirm_migrate: >-
      {{
        (
          (payload_migrations_count.stdout | trim | int == 0)
          or (payload_db_has_content_rows.stdout | trim != 't')
          or ((payload_bootstrap_result is defined) and (payload_bootstrap_result.changed | default(false)))
          or (payload_db_seeded | default(false))
        )
        or (payload_migrate_force | default(false) | bool)
      }}

- name: Run CMS migrations
  shell: >-
    printf 'y\n' | {{ compose_cmd }} run --rm -T -e CI=true cms npm run migrate
  args:
    chdir: "{{ project_root }}"
  become_user: "{{ app_user }}"
  when: payload_safe_to_autoconfirm_migrate

- name: Stop deployment if migrate requires confirmation on non-empty DB
  fail:
    msg: "Payload migrate requires confirmation because DB was previously pushed in dev mode. Refusing to auto-confirm on non-empty DB. Set payload_migrate_force=true to override."
  when: not payload_safe_to_autoconfirm_migrate
