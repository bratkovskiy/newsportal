---
- name: Ensure apt cache is up to date
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install base packages
  ansible.builtin.apt:
    name:
      - git
      - curl
      - unzip
      - ufw
      - python3-pip
    state: present
  become: true

- name: Ensure webapp group exists
  ansible.builtin.group:
    name: "{{ webapp_group }}"
    system: true
  become: true

- name: Ensure service users exist
  ansible.builtin.user:
    name: "{{ item.name }}"
    group: "{{ webapp_group }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: true
  loop:
    - { name: "{{ service_user_web }}" }
    - { name: "{{ service_user_cms }}" }
  loop_control:
    label: "{{ item.name }}"
  become: true

- name: Create directories for webapp root and envs
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "0755"
  loop:
    - { path: "{{ webapp_env_dir }}", owner: "root", group: "root" }
    - { path: "{{ webapp_root }}", owner: "root", group: "root" }
  become: true
